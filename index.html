<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to top, #ff9a9e, #fad0c4);
  overflow-x: hidden;
}

/* pages */
.page {
  display: none;
  min-height: 100vh;
  padding: 40px 20px;
  text-align: center;
  position: relative;
  z-index: 1; /* IMPORTANT */
}

.page.active {
  display: block;
}

/* text */
h1 {
  color: white;
  font-size: 1.8em;
  margin-top: 10vh;
}

p {
  color: white;
  font-size: 15px;
  max-width: 500px;
  margin: 15px auto;
}

/* button */
button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff6f91;
  color: white;
  cursor: pointer;
}

/* effects container */
#effects {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999; /* FIXED */
}

/* confetti */
.confetti {
  position: absolute;
  border-radius: 50%;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-20px); opacity:1; }
  100% { transform: translateY(110vh); opacity:0; }
}

/* balloons */
.balloon {
  position: absolute;
  border-radius: 50%;
  animation: fall linear forwards;
}

/* cake */
.cake {
  margin-top: 60px;
  position: relative;
  width: 120px;
  height: 80px;
  margin-left: auto;
  margin-right: auto;
}

.layer {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: #ff6f91;
  border-radius: 8px;
}

.layer.top {
  height: 25%;
  bottom: 40%;
  background: #ffd1dc;
}

/* candles */
.candle {
  position: absolute;
  width: 8px;
  height: 20px;
  background: yellow;
  top: -20px;
}

.c1 { left: 30px; }
.c2 { left: 56px; }
.c3 { left: 82px; }

.flame {
  width: 8px;
  height: 8px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -8px;
  animation: flicker 0.5s infinite;
}

@keyframes flicker {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
</style>
</head>

<body>

<div id="effects"></div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1>HAPPII BIRTHDAY BISHH 🥳🎉</h1>
  <p>click and stop acting annoying 😝</p>
  <button onclick="nextPage(2)">click ts 😝</button>

  <div class="cake">
    <div class="layer"></div>
    <div class="layer top"></div>
    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h1>OK LISTEN 😛</h1>
  <p>PUT YOUR TEXT HERE (same one you had)</p>
  <button onclick="nextPage(3)">Next 😛</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h1>SOME REAL STUFF 😠</h1>
  <p>PUT YOUR TEXT HERE</p>
  <button onclick="nextPage(4)">dont pmo and click ts🙄</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h1>FINAL 😛</h1>
  <p>You matter more than you think.</p>

  <div class="cake">
    <div class="layer"></div>
    <div class="layer top"></div>
    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>
  </div>
</div>

<script>
function nextPage(num){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+num).classList.add('active');
}

/* EFFECTS */
function spawnEffects(){
  const container = document.getElementById("effects");

  for(let i=0;i<10;i++){ // controlled amount
    let el = document.createElement("div");

    if(Math.random()<0.7){
      el.className="confetti";
      el.style.width = (5+Math.random()*5)+"px";
      el.style.height = el.style.width;
      el.style.background = `hsl(${Math.random()*360},100%,60%)`;
    } else {
      el.className="balloon";
      el.style.width = (25+Math.random()*10)+"px";
      el.style.height = (35+Math.random()*10)+"px";
      el.style.background = `hsl(${Math.random()*360},70%,60%)`;
    }

    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (3+Math.random()*3)+"s";

    container.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

/* continuous rain */
setInterval(spawnEffects, 200);
</script>

</body>
</html>
